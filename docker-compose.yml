services:
  # ── API server ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      AGENTREC_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agentrec}
      AGENTREC_REDIS_URL: redis://redis:6379/0
      AGENTREC_MODEL_PATH: /app/models/checkpoints/ncf_best.pt
      AGENTREC_DATA_DIR: /app/data
    volumes:
      - ./models/checkpoints:/app/models/checkpoints:ro
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agentrec}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Database seeder (one-shot) ──────────────────────────────────────
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AGENTREC_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agentrec}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    command: >
      python scripts/seed_db.py
      --database-url postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agentrec}
      --data-dir /app/data

volumes:
  pgdata:
  redisdata:
